name: Deploy Azure Function

# Deploys application code only (no infra). Runs automatically on pushes to main
# that touch the app, behind a build + test gate so broken code never ships.
# Infrastructure is provisioned separately and manually by infra.yml.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'host.json'
      - 'tsconfig.json'
      - '.funcignore'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Gate: fail the deploy before it starts if the code doesn't compile or
      # the tests don't pass. (Oryx rebuilds server-side via remote-build below;
      # this step is purely a safety check.)
      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy function package
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.FUNCTION_APP_NAME }}
          package: '.'
          remote-build: true
